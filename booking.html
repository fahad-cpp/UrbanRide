<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking - Car Rental</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f4; }
        form { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 0.5rem; margin: 0.5rem 0; }
        button { width: 100%; padding: 0.5rem; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        a { display: block; text-align: center; margin-top: 1rem; color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
    <form id="bookingForm">
        <h2>Book Your Car</h2>
        <input type="date" id="pickupDate" required>
        <input type="time" id="pickupTime" required>
        <input type="number" id="days" placeholder="Number of days" required>
        <button type="submit">Proceed to Payment</button>
        <a href="car-detail.html">Back</a>
    </form>
    <script>
        document.getElementById('bookingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // Store booking data (demo)
            const booking = {
                date: document.getElementById('pickupDate').value,
                time: document.getElementById('pickupTime').value,
                days: document.getElementById('days').value
            };
            localStorage.setItem('booking', JSON.stringify(booking));
            window.location.href = 'payment.html';
        });
    </script>
</body>
</html>
