<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Rental - Home</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }
        header { background-color: #007bff; color: white; padding: 1rem; text-align: center; }
        nav { display: flex; justify-content: center; gap: 1rem; margin: 1rem 0; }
        nav a { color: #007bff; text-decoration: none; font-weight: bold; }
        .cars { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; padding: 1rem; }
        .car { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 1rem; width: 300px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .car img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; }
        .car button { background: #28a745; color: white; border: none; padding: 0.5rem; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Car Rental</h1>
    </header>
    <nav>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
        <a href="contact.html">Contact</a>
    </nav>
    <section class="cars">
        <div class="car">
            <img src="https://via.placeholder.com/300x200?text=Toyota+Camry" alt="Toyota Camry">
            <h3>Toyota Camry</h3>
            <p>$50/day</p>
            <button onclick="selectCar(1)">Select</button>
        </div>
        <div class="car">
            <img src="https://via.placeholder.com/300x200?text=Honda+Civic" alt="Honda Civic">
            <h3>Honda Civic</h3>
            <p>$45/day</p>
            <button onclick="selectCar(2)">Select</button>
        </div>
        <div class="car">
            <img src="https://via.placeholder.com/300x200?text=Ford+Mustang" alt="Ford Mustang">
            <h3>Ford Mustang</h3>
            <p>$80/day</p>
            <button onclick="selectCar(3)">Select</button>
        </div>
    </section>
    <script>
        function selectCar(id) {
            window.location.href = `car-detail.html?id=${id}`;
        }
    </script>
</body>
</html>
