<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Car Rental</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f4; }
        form { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 0.5rem; margin: 0.5rem 0; }
        button { width: 100%; padding: 0.5rem; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        a { display: block; text-align: center; margin-top: 1rem; color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
    <form id="registerForm">
        <h2>Register</h2>
        <input type="text" id="username" placeholder="Username" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Register</button>
        <a href="login.html">Already have an account? Login</a>
        <a href="index.html">Back to Home</a>
    </form>
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value
            };
            localStorage.setItem('user', JSON.stringify(user));
            alert('Registered successfully!');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
