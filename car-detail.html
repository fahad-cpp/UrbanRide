<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Details - Car Rental</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 1rem; background-color: #f4f4f4; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        img { width: 100%; border-radius: 8px; }
        button { padding: 0.5rem; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        a { color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2 id="carTitle">Car Details</h2>
        <img id="carImage" src="" alt="Car">
        <p id="carDesc">Description</p>
        <p id="carPrice">Price</p>
        <button onclick="bookCar()">Book Now</button>
        <br><a href="index.html">Back to Home</a>
    </div>
    <script>
        const cars = {
            1: { title: 'Toyota Camry', image: 'https://via.placeholder.com/600x400?text=Toyota+Camry', desc: 'Comfortable sedan.', price: '$50/day' },
            2: { title: 'Honda Civic', image: 'https://via.placeholder.com/600x400?text=Honda+Civic', desc: 'Reliable compact car.', price: '$45/day' },
            3: { title: 'Ford Mustang', image: 'https://via.placeholder.com/600x400?text=Ford+Mustang', desc: 'Sporty coupe.', price: '$80/day' }
        };
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        if (cars[id]) {
            document.getElementById('carTitle').textContent = cars[id].title;
            document.getElementById('carImage').src = cars[id].image;
            document.getElementById('carDesc').textContent = cars[id].desc;
            document.getElementById('carPrice').textContent = cars[id].price;
        }
        function bookCar() {
            window.location.href = 'booking.html';
        }
    </script>
</body>
</html>
